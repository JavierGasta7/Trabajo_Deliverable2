<!DOCTYPE HTML>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>GymTrack - Bienvenido</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="menu">
    <span class="brand">GYMTRACK</span>
    <a href="index.html">Inicio</a>
</div>

<div class="subheader">Sistema de Gestión de Gimnasio Universitario</div>

<div class="card" style="max-width:500px; margin: 50px auto;">
    <div class="title">Bienvenido a GYMTRACK</div>
    <div class="subtitle">Identifícate para acceder a tu panel</div>

    <form action="LoginServlet" method="post" style="margin-top: 20px;">
        <div style="margin-bottom: 15px; text-align: left;">
            <label>Correo Electrónico:</label>
            <input type="email" name="email" placeholder="ejemplo@university.edu" required style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>
        
        <div style="margin-bottom: 20px; text-align: left;">
            <label>Contraseña:</label>
            <input type="password" name="password" placeholder="••••••••" required style="width: 100%; padding: 8px; margin-top: 5px;">
        </div>

        <button class="primary" type="submit" style="width: 100%;">Entrar →</button>
    </form>

    <div style="margin-top: 25px; border-top: 1px solid #eee; padding-top: 15px;">
        <p style="font-size: 12px; color: #6b7280; margin-bottom: 10px; font-weight: bold;">Cuentas de prueba rápida:</p>
        <div style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;">
            
            <button type="button" class="secondary" style="font-size: 11px; padding: 6px 12px;" 
                onclick="document.getElementsByName('email')[0].value='admin@university.edu'; document.getElementsByName('password')[0].value='Admin1234';">
                Admin
            </button>

            <button type="button" class="secondary" style="font-size: 11px; padding: 6px 12px;" 
                onclick="document.getElementsByName('email')[0].value='carlos.mendez@university.edu'; document.getElementsByName('password')[0].value='Instr1234';">
                Instructor
            </button>

            <button type="button" class="secondary" style="font-size: 11px; padding: 6px 12px;" 
                onclick="document.getElementsByName('email')[0].value='ana.garcia@university.edu'; document.getElementsByName('password')[0].value='Member1234';">
                Miembro
            </button>

        </div>
    </div>
</div>

<div style="max-width: 800px; margin: 40px auto; padding: 20px; border-top: 1px dashed #ccc; text-align: center;">
    <h3 style="color: #6b7280; font-size: 14px;">Panel de Evaluación Técnica (Servlets de alumnos)</h3>
    <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 10px;">
        <a href="BrowseClassesServlet" class="secondary" style="font-size: 11px; text-decoration: none; padding: 5px 10px; border: 1px solid #ddd; border-radius: 4px;">Explorar Clases (Marco)</a>
        <a href="BookingHistoryServlet" class="secondary" style="font-size: 11px; text-decoration: none; padding: 5px 10px; border: 1px solid #ddd; border-radius: 4px;">Historial (Marco)</a>
        <a href="OccupancyMonitorServlet" class="secondary" style="font-size: 11px; text-decoration: none; padding: 5px 10px; border: 1px solid #ddd; border-radius: 4px;">Ocupación (Ander)</a>
        <a href="AdminDashboardServlet" class="secondary" style="font-size: 11px; text-decoration: none; padding: 5px 10px; border: 1px solid #ddd; border-radius: 4px;">Panel Admin (Ander)</a>
    </div>
</div>

</body>
</html>
